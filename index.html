<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Flow Education 총무기획팀 Graph RAG 임차료 배부 대시보드">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>Graph RAG 임차료 배부 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f6fb;
  --surface: #ffffff;
  --surface2: #f0f2f8;
  --border: #dde1ef;
  --text: #1a1d2e;
  --text-sub: #6b7494;
  --accent: #4263eb;
  --accent2: #0ea5d0;
  --success: #2f9e44;
  --warning: #e67700;
  --danger: #e03131;

  /* 관코드 색상 */
  --c-tedi: #d9480f;
  --c-youngjae: #2f9e44;
  --c-jungsa: #1864ab;
  --c-mix: #7048e8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nanum Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── 로그인 ── */
#loginScreen {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--bg); z-index: 9999;
}
.login-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 40px; width: 360px;
}
.login-box h2 { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.login-box p { font-size: 13px; color: var(--text-sub); margin-bottom: 28px; }
.login-box input {
  width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px; margin-bottom: 12px; outline: none;
  font-family: 'Nanum Gothic', sans-serif;
}
.login-box input:focus { border-color: var(--accent); }
.login-box button {
  width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none;
  border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: 'Nanum Gothic', sans-serif;
}
.login-box button:hover { background: #4c6ef5; }
.login-err { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }

/* ── 앱 레이아웃 ── */
#app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }


/* ── 8:2 메인 레이아웃 ── */
.main-layout {
  display: flex; flex: 1; overflow: hidden; min-height: 0;
}
#tabContents {
  flex: 1; overflow-y: auto; min-width: 0;
  transition: all .3s ease;
}

/* ── AI 사이드 패널 ── */
.ai-sidebar {
  width: 300px; min-width: 300px; max-width: 300px;
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: all .3s ease; overflow: hidden;
}
.ai-sidebar.collapsed { width: 0; min-width: 0; max-width: 0; border: none; }

.ai-sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  background: var(--surface2); flex-shrink: 0;
}
.ai-sidebar-header .title {
  font-size: 13px; font-weight: 800; color: var(--accent);
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.ai-sidebar-header .collapse-btn {
  background: none; border: none; color: var(--text-sub); cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 4px; line-height: 1;
  transition: color .15s;
}
.ai-sidebar-header .collapse-btn:hover { color: var(--text); }

.ai-sidebar-body {
  display: flex; flex-direction: column; flex: 1; overflow: hidden; padding: 12px;
}
.ai-key-section {
  display: flex; gap: 6px; margin-bottom: 10px; align-items: center; flex-shrink: 0;
}
.ai-key-section input {
  flex: 1; padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 11px; outline: none;
  font-family: 'JetBrains Mono', monospace; min-width: 0;
}
.ai-key-section input:focus { border-color: var(--accent); }
.ai-key-section input::placeholder { color: var(--text-sub); font-size: 10px; }

.ai-sidebar-messages {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
  padding: 4px 0; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.ai-sidebar-messages::-webkit-scrollbar { width: 4px; }
.ai-sidebar-messages::-webkit-scrollbar-track { background: transparent; }
.ai-sidebar-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.si-msg {
  padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
}
.si-msg.user {
  background: var(--accent); color: #fff; align-self: flex-end;
  max-width: 90%; border-bottom-right-radius: 3px;
}
.si-msg.ai {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); align-self: flex-start;
  max-width: 95%; border-bottom-left-radius: 3px;
}
.si-msg.loading { color: var(--text-sub); font-style: italic; background: var(--surface2); }

.ai-sidebar-input {
  display: flex; gap: 6px; margin-top: 10px; flex-shrink: 0;
}
.ai-sidebar-input textarea {
  flex: 1; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 12px; outline: none; resize: none;
  font-family: 'Nanum Gothic', sans-serif; height: 60px; min-width: 0;
}
.ai-sidebar-input textarea:focus { border-color: var(--accent); }
.ai-sidebar-input button {
  padding: 0 12px; background: var(--accent); color: #fff; border: none;
  border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: 'Nanum Gothic', sans-serif; align-self: stretch; flex-shrink: 0;
}
.ai-sidebar-input button:hover { background: #4c6ef5; }

.ai-toggle-fab {
  position: fixed; right: 0; top: 50%; transform: translateY(-50%);
  width: 28px; height: 72px; background: var(--accent); border: none;
  border-radius: 8px 0 0 8px; color: #fff; font-size: 11px; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  box-shadow: -2px 0 12px rgba(92,124,250,.3); z-index: 200;
  writing-mode: vertical-rl; font-family: 'Nanum Gothic', sans-serif; font-weight: 800;
  letter-spacing: 1px; padding: 8px 0;
}
.ai-toggle-fab.visible { display: flex; }

.ai-sidebar-footer {
  display: flex; justify-content: flex-end; margin-top: 6px; flex-shrink: 0;
}
.ai-clear-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-sub); font-size: 11px; padding: 3px 10px; cursor: pointer;
  font-family: 'Nanum Gothic', sans-serif;
}
.ai-clear-btn:hover { border-color: var(--danger); color: var(--danger); }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px; background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
header .logo { font-size: 15px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 8px; }
header .user-info { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 12px; }
header .user-info span { color: var(--text); font-weight: 700; }
header button.logout {
  padding: 4px 12px; background: transparent; border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-sub); font-size: 12px; cursor: pointer;
  font-family: 'Nanum Gothic', sans-serif;
}

/* ── 탭 네비 ── */
.tab-nav {
  display: flex; flex-wrap: nowrap; gap: 2px; padding: 6px 12px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  overflow-x: auto; flex-shrink: 0; scrollbar-width: thin;
}
.tab-nav {
  display: flex; flex-wrap: nowrap; gap: 2px; padding: 6px 12px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  overflow-x: auto; flex-shrink: 0;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.tab-nav::-webkit-scrollbar { height: 3px; }
.tab-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.tab-btn {
  padding: 5px 11px; border: none; border-radius: 6px; font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap; background: transparent; color: var(--text-sub);
  font-family: 'Nanum Gothic', sans-serif; transition: all .15s; flex-shrink: 0;
}
.tab-btn:hover { background: var(--surface2); color: var(--text); }
.tab-btn.active { background: var(--accent); color: #fff; }


/* ── 컨텐츠 영역 ── */
.tab-content { display: none; padding: 24px; flex: 1; }
.tab-content.active { display: block; }

/* ── 공통 카드 ── */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; margin-bottom: 16px;
}
.card-title {
  font-size: 13px; font-weight: 800; color: var(--text-sub); text-transform: uppercase;
  letter-spacing: .5px; margin-bottom: 16px;
}

/* ── KPI 카드 그리드 ── */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px; position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent);
}
.kpi-card.c-tedi::before { background: var(--c-tedi); }
.kpi-card.c-youngjae::before { background: var(--c-youngjae); }
.kpi-card.c-jungsa::before { background: var(--c-jungsa); }
.kpi-card.c-total::before { background: var(--accent); }
.kpi-label { font-size: 11px; color: var(--text-sub); font-weight: 700; margin-bottom: 6px; }
.kpi-value { font-size: 22px; font-weight: 800; color: var(--text); font-family: 'JetBrains Mono', monospace; }
.kpi-sub { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

/* ── 테이블 ── */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 8px 12px; text-align: left; color: var(--text-sub); font-weight: 700; font-size: 11px;
     border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .3px; }
td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.num { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

/* ── 배지 ── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;
}
.badge.A { background: rgba(92,124,250,.18); color: var(--accent); }
.badge.B { background: rgba(72,219,251,.18); color: var(--accent2); }
.badge.E { background: rgba(255,107,107,.18); color: var(--danger); }
.badge.tedi { background: rgba(247,103,7,.18); color: var(--c-tedi); }
.badge.youngjae { background: rgba(47,158,68,.18); color: var(--c-youngjae); }
.badge.jungsa { background: rgba(25,113,194,.18); color: var(--c-jungsa); }
.badge.mix { background: rgba(156,54,181,.18); color: var(--c-mix); }

/* ── 히트맵 ── */
.heatmap-wrap { overflow-x: auto; }
.heatmap { border-collapse: collapse; min-width: 500px; }
.heatmap th { padding: 6px 10px; font-size: 11px; color: var(--text-sub); text-align: center; font-weight: 700; }
.heatmap td { width: 80px; height: 38px; text-align: center; font-size: 11px; font-weight: 700;
              border: 1px solid var(--bg); border-radius: 4px; cursor: default; }
.hm-empty { background: var(--surface2); color: var(--text-sub); }
.hm-tedi { background: rgba(217,72,15,.15); color: #7c2900; }
.hm-youngjae { background: rgba(47,158,68,.15); color: #1a5c2a; }
.hm-jungsa { background: rgba(24,100,171,.15); color: #0f3d6b; }
.hm-mix { background: rgba(112,72,232,.15); color: #3d1f9e; }

/* ── 시간표 ── */
.tt-wrap { overflow-x: auto; }
.tt-table { border-collapse: collapse; min-width: 560px; }
.tt-table th { padding: 6px 10px; font-size: 11px; color: var(--text-sub); text-align: center; font-weight: 700; }
.tt-table td { height: 36px; border: 1px solid var(--border); font-size: 11px; text-align: center; padding: 4px; }
.tt-empty { background: var(--surface2); }
.tt-tedi { background: rgba(217,72,15,.12); color: #7c2900; }
.tt-youngjae { background: rgba(47,158,68,.12); color: #1a5c2a; }
.tt-jungsa { background: rgba(24,100,171,.12); color: #0f3d6b; }
.tt-mix { background: rgba(112,72,232,.12); color: #3d1f9e; }

/* ── 바 차트 ── */
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 12px; }
.bar-label { width: 80px; font-size: 12px; color: var(--text-sub); text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; height: 22px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px;
            font-size: 11px; font-weight: 700; color: #fff; transition: width .6s ease; white-space: nowrap; }
.bar-val { width: 100px; font-size: 12px; font-family: 'JetBrains Mono', monospace;
           text-align: right; flex-shrink: 0; }

/* ── 입력 탭 ── */
.inp-steps { display: flex; gap: 0; margin-bottom: 24px; }
.inp-step {
  flex: 1; padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border);
  font-size: 13px; font-weight: 700; color: var(--text-sub); text-align: center;
}
.inp-step:first-child { border-radius: 8px 0 0 8px; }
.inp-step:last-child { border-radius: 0 8px 8px 0; }
.inp-step.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.inp-step.done { background: rgba(81,207,102,.15); color: var(--success); border-color: var(--success); }

.step-panel { display: none; }
.step-panel.active { display: block; }

select, .inp-select {
  padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer;
  font-family: 'Nanum Gothic', sans-serif; outline: none;
}
select:focus, .inp-select:focus { border-color: var(--accent); }

.btn {
  padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
  border: none; font-family: 'Nanum Gothic', sans-serif; transition: all .15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #4c6ef5; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-success { background: var(--success); color: #fff; }

/* ── 시간표 입력 그리드 ── */
.tt-inp-wrap { overflow-x: auto; margin-top: 16px; }
.tt-inp { border-collapse: collapse; }
.tt-inp th { padding: 6px 10px; font-size: 11px; color: var(--text-sub); font-weight: 700; text-align: center; }
.tt-inp td { border: 1px solid var(--border); }
.tt-inp .room-label { padding: 6px 10px; font-size: 12px; color: var(--text); white-space: nowrap;
                      background: var(--surface2); font-weight: 700; }
.tt-cell {
  width: 110px; min-width: 110px; height: 40px; background: var(--surface2); cursor: pointer;
  font-size: 10px; text-align: center; vertical-align: middle; padding: 2px;
  transition: background .1s; position: relative; color: var(--text-sub);
}
.tt-cell:hover { background: #e4e8f5; }
.tt-cell.filled { font-weight: 700; }
.tt-cell.tedi-fill { background: rgba(217,72,15,.15); color: #7c2900; }
.tt-cell.youngjae-fill { background: rgba(47,158,68,.15); color: #1a5c2a; }
.tt-cell.jungsa-fill { background: rgba(24,100,171,.15); color: #0f3d6b; }

/* ── 관리자 탭 ── */
.admin-section { margin-bottom: 24px; }
.admin-section h3 { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 12px;
                     border-left: 3px solid var(--accent); padding-left: 10px; }
.log-table td { font-size: 12px; font-family: 'JetBrains Mono', monospace; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 24px; right: 24px; width: 48px; height: 48px;
  background: var(--accent); border: none; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
  box-shadow: 0 4px 20px rgba(92,124,250,.4); z-index: 500; transition: all .2s;
}
.fab:hover { transform: scale(1.1); background: #4c6ef5; }

/* ── 모달 ── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000;
  display: none; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 28px; width: 460px; max-width: 95vw;
}
.modal h3 { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
.modal-row { margin-bottom: 12px; }
.modal-row label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 4px; font-weight: 700; }
.modal-row select, .modal-row textarea, .modal-row input {
  width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; font-family: 'Nanum Gothic', sans-serif; outline: none;
}
.modal-row textarea { height: 80px; resize: vertical; }
.modal-row select:focus, .modal-row input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ── 전월/당월 비교 ── */
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.compare-col { background: var(--surface2); border-radius: 10px; padding: 16px; }
.compare-col h4 { font-size: 12px; font-weight: 800; color: var(--text-sub); margin-bottom: 12px;
                  text-transform: uppercase; letter-spacing: .4px; }
.diff-up { color: var(--danger); }
.diff-dn { color: var(--success); }
.diff-eq { color: var(--text-sub); }

/* ── Claude AI 패널 ── */
.ai-panel { display: flex; flex-direction: column; gap: 12px; }
.ai-input-row { display: flex; gap: 8px; }
.ai-input-row input {
  flex: 1; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; outline: none;
  font-family: 'Nanum Gothic', sans-serif;
}
.ai-input-row input:focus { border-color: var(--accent); }
.ai-messages { min-height: 200px; max-height: 420px; overflow-y: auto;
               background: var(--surface2); border-radius: 8px; padding: 16px;
               display: flex; flex-direction: column; gap: 10px; }
.ai-msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; max-width: 90%; }
.ai-msg.user { background: var(--accent); color: #fff; align-self: flex-end; }
.ai-msg.ai { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; color: var(--text); }
.ai-msg.loading { color: var(--text-sub); font-style: italic; }
.ai-key-row { display: flex; gap: 8px; align-items: center; }
.ai-key-row input {

.campus-pick-btn {
  padding: 8px 18px; border: 2px solid var(--border); border-radius: 20px;

}

.campus-pick-btn.selected { border-color: var(--accent); background: #eef2ff; color: var(--accent); }

.tt-cell-modified { outline: 2px solid var(--warning) !important; outline-offset: -2px; }

function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const acc = ACCOUNTS[id];
  if (!acc || acc.pw !== pw) {
    document.getElementById('loginErr').style.display = 'block'; return;
  }
  currentUser = { id, ...acc };
  loadBldgRegions(); // localStorage에서 지역 설정 복원
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('headerUser').textContent = acc.name;
  document.getElementById('headerRole').textContent = acc.role === 'hq' ? '(본부장급)' : '(원장급)';
  buildTabs();
}
document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogout() {
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
}

function canSeeTab(tab) {
  // hq: 모든 탭
  if (currentUser.role === 'hq') return true;
  // 전체공개
  if (tab.role === 'all') return true;
  // 로그인 후 공개 (사용현황 입력)
  if (tab.role === 'login') return true;
  // hq 전용 (관리자) → dir 불가
  if (tab.role === 'hq') return false;
  // 건물 탭 → dir는 자신의 캠퍼스 건물만
  if (tab.role === 'bldg') return currentUser.campus ? currentUser.campus.includes(tab.id) : false;
  return false;
}

function buildTabs() {
  const nav = document.getElementById('tabNav');
  const contents = document.getElementById('tabContents');
  nav.innerHTML = '';
  contents.innerHTML = '';

  const visible = ALL_TABS.filter(canSeeTab);
  visible.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = tab.label;
    btn.onclick = () => switchTab(tab.id);
    btn.id = 'tbtn-' + tab.id;
    nav.appendChild(btn);

    const div = document.createElement('div');
    div.className = 'tab-content';
    div.id = 'tab-' + tab.id;
    try {
      div.innerHTML = renderTab(tab.id);
    } catch(e) {
      div.innerHTML = `<div style="padding:40px;color:var(--danger)">⚠ 렌더링 오류 (${tab.id}): ${e.message}</div>`;
      console.error('Tab render error [' + tab.id + ']:', e);
    }
    contents.appendChild(div);
  });

  switchTab(visible[0].id);
}

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const btn = document.getElementById('tbtn-' + id);
  const content = document.getElementById('tab-' + id);
  if (btn) btn.classList.add('active');
  if (content) content.classList.add('active');
  currentTab = id;
  if (id === 'summary') initSummary();
  if (id === 'admin')   setTimeout(() => initEffAnalysis(), 50);
}

function renderTab(id) {
  if (id === 'summary') return renderSummary();
  if (id === 'input')   return renderInput();
  if (id === 'admin')   return renderAdmin();
  if (BUILDINGS[id])    return renderBuilding(id);
  return `<div style="color:var(--text-sub);padding:40px;text-align:center">준비 중입니다</div>`;
}

// 서머리 필터 상태
let sumFilter = { region: '', building: '', floor: '' };

function renderSummary() {
  // 지역/건물/층수 옵션 수집
  const allBldgs = Object.entries(BUILDINGS);
  const regions  = [...new Set(allBldgs.map(([,b]) => b.region).filter(Boolean))].sort();
  const names    = [...new Set(allBldgs.map(([,b]) => b.name).filter(Boolean))].sort();
  const floors   = [...new Set(allBldgs.map(([,b]) => {
    const m = (b.name||'').match(/(\d+층)/);
    return m ? m[1] : '';
  }).filter(Boolean))].sort((a,b) => parseInt(a)-parseInt(b));

  return `
  <!-- 필터 바 -->
  <div class="card" style="padding:14px 20px;margin-bottom:12px">
    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
      <div style="font-size:13px;font-weight:800;color:var(--text);white-space:nowrap">🔍 조회 필터</div>
      ${[
        ['sum_f_region',  '지역',   regions],
        ['sum_f_building','건물명',  names],
        ['sum_f_floor',   '층수',    floors],
      ].map(([fid, label, opts]) => `
      <div>
        <div style="font-size:11px;color:var(--text-sub);margin-bottom:3px;font-weight:700">${label}</div>
        <select id="${fid}" onchange="applySumFilter()"
          style="padding:6px 10px;background:var(--surface2);border:1px solid var(--border);
                 border-radius:6px;color:var(--text);font-size:12px;outline:none;
                 font-family:'Nanum Gothic',sans-serif;min-width:100px">
          <option value="">전체</option>
          ${opts.map(o=>`<option value="${o}">${o}</option>`).join('')}
        </select>
      </div>`).join('')}
      <button onclick="resetSumFilter()"
        style="padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:none;
               color:var(--text-sub);font-size:12px;cursor:pointer;font-family:'Nanum Gothic',sans-serif">
        초기화
      </button>
      <div id="sum_filter_count" style="font-size:12px;color:var(--text-sub);margin-left:4px"></div>
    </div>
  </div>

  <!-- KPI + 차트 (필터 적용 영역) -->
  <div id="sum_content"></div>
  `;
}

function applySumFilter() {
  sumFilter.region   = document.getElementById('sum_f_region')?.value  || '';
  sumFilter.building = document.getElementById('sum_f_building')?.value || '';
  sumFilter.floor    = document.getElementById('sum_f_floor')?.value   || '';
  renderSummaryContent();
}

function resetSumFilter() {
  sumFilter = { region:'', building:'', floor:'' };
  ['sum_f_region','sum_f_building','sum_f_floor'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  renderSummaryContent();
}

function renderSummaryContent() {
  const el = document.getElementById('sum_content');
  if (!el) return;

  const allBldgs = Object.entries(BUILDINGS);
  const filtered = allBldgs.filter(([id, b]) => {
    if (sumFilter.region   && b.region !== sumFilter.region) return false;
    if (sumFilter.building && b.name   !== sumFilter.building) return false;
    if (sumFilter.floor) {
      const m = (b.name||'').match(/(\d+층)/);
      if (!m || m[1] !== sumFilter.floor) return false;
    }
    return true;
  });

  const cntEl = document.getElementById('sum_filter_count');
  if (cntEl) cntEl.textContent = filtered.length < allBldgs.length
    ? `${filtered.length}개 건물 표시 중`
    : '';

  if (filtered.length === 0) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:48px;color:var(--text-sub)">
      조건에 맞는 건물이 없습니다.</div>`;
    return;
  }

  const totalRent = filtered.reduce((s,[,b]) => s + (b.rent||0), 0);
  const totalArea = filtered.reduce((s,[,b]) => s + (b.area||0), 0);
  const maxRent   = Math.max(...filtered.map(([,b]) => b.rent||0));

  const campusTotals = {};
  filtered.forEach(([,b]) => {

        return `<div class="bar-row">
          <div class="bar-label" style="width:110px;font-size:11px">${b.name}</div>

      <tbody>
        ${filtered.sort((a,b)=>(b[1].rent||0)-(a[1].rent||0)).map(([id,b]) => `
        <tr onclick="showBuildingInline('${id}')" style="cursor:pointer" title="클릭하면 상세 표시">
          <td style="font-weight:700;color:var(--accent)">${b.name} 🔍</td>
          <td><span style="padding:2px 7px;border-radius:4px;font-size:11px;background:#f0f4ff;color:#4263eb">${b.region||'-'}</span></td>
          <td class="num">${b.area}평</td>
          <td class="num" style="font-weight:700">${fmt(b.rent)}</td>
          <td class="num">${(b.unitPrice||0).toLocaleString()}원</td>
          <td style="font-size:11px;color:var(--text-sub)">${b.month||'-'}</td>
          <td style="font-size:11px">${(b.campuses||[]).join(', ')||'-'}</td>
        </tr>`).join('')}
        <tr style="border-top:2px solid var(--accent);font-weight:800">
          <td>합계</td><td></td>
          <td class="num">${totalArea.toFixed(1)}평</td>
          <td class="num" style="color:var(--accent)">${fmt(totalRent)}</td>

// 서머리 탭 진입 시 콘텐츠 초기화
function initSummary() {
  setTimeout(() => renderSummaryContent(), 30);
}

// 서머리에서 건물 클릭 → 하단에 인라인으로 해당 건물 상세 표시
function showBuildingInline(id) {
  const b = BUILDINGS[id];
  if (!b) return;

  // 기존 인라인 패널 제거
  const existing = document.getElementById('_bldg_inline');
  if (existing) {
    if (existing.dataset.id === id) { existing.remove(); return; } // 같은 건물 클릭 시 토글
    existing.remove();
  }

  // sum_content 아래에 패널 추가
  const sumContent = document.getElementById('sum_content');
  if (!sumContent) return;

  const panel = document.createElement('div');
  panel.id = '_bldg_inline';
  panel.dataset.id = id;
  panel.style.cssText = 'margin-top:8px;border:2px solid var(--accent);border-radius:12px;overflow:hidden';
  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;
                padding:12px 20px;background:var(--accent);color:#fff">
      <div style="font-size:15px;font-weight:800">📍 ${b.name}</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="switchTab('${id}')"
          style="padding:4px 12px;border:1px solid rgba(255,255,255,.5);border-radius:6px;
                 background:rgba(255,255,255,.15);color:#fff;font-size:11px;cursor:pointer;
                 font-family:'Nanum Gothic',sans-serif">탭으로 이동 ↗</button>
        <button onclick="document.getElementById('_bldg_inline').remove()"
          style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0 4px">✕</button>
      </div>
    </div>
    <div style="padding:16px;background:var(--surface)">
      ${renderBuilding(id)}
    </div>`;

  sumContent.appendChild(panel);
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}


// 지역 설정 저장소 (BUILDINGS 객체에 반영 + localStorage 영속)
const REGION_OPTIONS = ['수지','수내','광교','영통','이매','정자'];

function loadBldgRegions() {
  try {
    const saved = JSON.parse(localStorage.getItem('bldgRegions') || '{}');
    Object.entries(saved).forEach(([id, region]) => {
      if (BUILDINGS[id]) BUILDINGS[id].region = region;
    });
  } catch(e) {}
}

function saveBldgRegion(bldgId, region) {
  try {
    const saved = JSON.parse(localStorage.getItem('bldgRegions') || '{}');
    saved[bldgId] = region;
    localStorage.setItem('bldgRegions', JSON.stringify(saved));
    if (BUILDINGS[bldgId]) BUILDINGS[bldgId].region = region;
    showToast(`지역이 "${region}"으로 저장되었습니다.`);
    // 서머리 필터 옵션도 갱신
    if (currentTab === 'summary') initSummary();
  } catch(e) {
    showToast('저장 실패: ' + e.message, true);
  }
}

function renderRegionBar(bldgId) {
  const b = BUILDINGS[bldgId];
  if (!b) return '';
  const cur = b.region || '';
  return `
  <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;
              background:#f0f4ff;border:1px solid #c5d5ff;border-radius:10px;
              margin-bottom:12px;flex-wrap:wrap">
    <div style="font-size:12px;font-weight:800;color:#4263eb;white-space:nowrap">📍 지역 설정</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${REGION_OPTIONS.map(r => `
        <button id="rbtn_${bldgId}_${r}" onclick="selectRegionBtn('${bldgId}','${r}')"
          style="padding:4px 12px;border-radius:16px;border:1px solid ${cur===r?'#4263eb':'#c5d5ff'};
                 background:${cur===r?'#4263eb':'#fff'};color:${cur===r?'#fff':'#4263eb'};
                 font-size:12px;font-weight:700;cursor:pointer;font-family:'Nanum Gothic',sans-serif;
                 transition:all .15s">
          ${r}
        </button>`).join('')}
      <input type="text" id="rinput_${bldgId}" value="${cur}"
        placeholder="직접 입력..."
        style="padding:4px 10px;border:1px solid #c5d5ff;border-radius:16px;
               font-size:12px;outline:none;width:90px;color:#4263eb;font-family:'Nanum Gothic',sans-serif">
    </div>
    <button onclick="saveRegionBtn('${bldgId}')"
      style="padding:5px 14px;background:#4263eb;color:#fff;border:none;border-radius:8px;
             font-size:12px;font-weight:800;cursor:pointer;font-family:'Nanum Gothic',sans-serif;
             white-space:nowrap">
      💾 저장
    </button>
    <span style="font-size:11px;color:#4263eb;opacity:.7">현재: <strong>${cur||'미설정'}</strong></span>
  </div>`;
}

function selectRegionBtn(bldgId, region) {
  // 버튼 선택 표시
  REGION_OPTIONS.forEach(r => {
    const btn = document.getElementById(`rbtn_${bldgId}_${r}`);
    if (!btn) return;
    const sel = r === region;
    btn.style.background = sel ? '#4263eb' : '#fff';
    btn.style.color      = sel ? '#fff' : '#4263eb';
    btn.style.borderColor= sel ? '#4263eb' : '#c5d5ff';
  });
  // input에도 반영
  const inp = document.getElementById(`rinput_${bldgId}`);
  if (inp) inp.value = region;
}

function saveRegionBtn(bldgId) {
  const inp = document.getElementById(`rinput_${bldgId}`);
  const region = inp ? inp.value.trim() : '';
  if (!region) { showToast('지역을 선택하거나 입력해주세요.', true); return; }
  saveBldgRegion(bldgId, region);
  // 버튼 상태 갱신
  REGION_OPTIONS.forEach(r => {
    const btn = document.getElementById(`rbtn_${bldgId}_${r}`);
    if (!btn) return;
    const sel = r === region;
    btn.style.background = sel ? '#4263eb' : '#fff';
    btn.style.color      = sel ? '#fff' : '#4263eb';
    btn.style.borderColor= sel ? '#4263eb' : '#c5d5ff';
  });
  // 현재 표시 갱신
  const curSpan = inp?.parentElement?.parentElement?.querySelector('strong');
  if (curSpan) curSpan.textContent = region;
}

function renderBuilding(id) {
  const b = BUILDINGS[id];
  if (!b) return `<div style="padding:40px;text-align:center;color:var(--text-sub)">건물 정보 없음</div>`;

  const regionBar = renderRegionBar(id);
  // 상세 데이터(calcRows, heatmap) 있으면 풀 레이아웃, 없으면 기본 KPI
  if (b.calcRows && b.calcRows.length > 0) return regionBar + renderBuildingFull(b);
  return regionBar + renderBuildingBasic(b);
}

          ${DAYS.map(d=>`<th>${DAY_KR[d]}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${Object.entries(b.heatmap).map(([room, pat]) => `
          <tr>
            <th style="text-align:left;padding:4px 10px;font-size:12px;color:var(--text)">${room}</th>
            ${DAYS.map(d => {
              const val = pat[d] || '-';
              if (!val || val === '-') return `<td class="hm-empty">-</td>`;
              if (val.includes('/') || val === 'MIX') return `<td class="hm-mix">${val}</td>`;
              // 캠퍼스별 색상 동적 적용
              const cls = b.campusColors && b.campusColors[val];
              if (cls === 'tedi'     || val === '테디')    return `<td class="hm-tedi">${val}</td>`;
              if (cls === 'youngjae' || val === '영재')    return `<td class="hm-youngjae">${val}</td>`;
              if (cls === 'jungsa'   || val === '중사')    return `<td class="hm-jungsa">${val}</td>`;
              // 색상 클래스 없으면 인덱스 기반 색상 할당
              const campIdx = (b.campuses||[]).indexOf(val);
              const colors = ['hm-tedi','hm-youngjae','hm-jungsa','hm-mix'];
              const hmCls = campIdx >= 0 ? (colors[campIdx % colors.length]) : 'hm-empty';
              return `<td class="${hmCls}">${val}</td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;

  const compareHtml = renderCompare(b);

  return kpiHtml + campAlloc + commonsDetail + heatmapHtml + calcDetail + compareHtml;
}

// ── 건물 선택
function selectBldg(id) {
  inpState.building = id;
  document.querySelectorAll('.bldg-pick').forEach(el => el.classList.remove('selected'));
  document.getElementById('bpick_' + id).classList.add('selected');

  // 관코드 버튼 갱신
  const campuses = INP_CAMPUSES[id] || [];
  inpState.campuses = [];
  const btns = document.getElementById('campus_btns');
  if (btns) {
    btns.innerHTML = campuses.map(c => `
      <button class="campus-pick-btn" id="cpick_${c}" onclick="toggleCampus('${c}')">
        <span style="width:10px;height:10px;border-radius:50%;background:${INP_BG[c]};display:inline-block;border:2px solid ${INP_FC[c]}"></span>
        ${c}
      </button>`).join('') ||
      `<span style="color:var(--text-sub);font-size:13px">데이터 미등록 건물입니다</span>`;
  }
}

// ── 관코드 다중선택 토글
function toggleCampus(c) {
  const idx = inpState.campuses.indexOf(c);
  if (idx >= 0) inpState.campuses.splice(idx, 1);
  else inpState.campuses.push(c);
  // UI 업데이트
  document.querySelectorAll('.campus-pick-btn').forEach(btn => btn.classList.remove('selected'));
  inpState.campuses.forEach(sel => {
    const btn = document.getElementById('cpick_' + sel);
    if (btn) btn.classList.add('selected');
  });
  const label = document.getElementById('campus_sel_label');
  if (label) label.textContent = inpState.campuses.length
    ? '선택된 관: ' + inpState.campuses.join(', ')
    : '선택된 관: 없음';
}
// ── 구 단일선택 호환
function selectCampus(c) { toggleCampus(c); }

// ── 전월 레이블 업데이트
function updatePrevMonthLabel() {
  const [y, m] = inpState.month.split('-').map(Number);
  const pm = m === 1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,'0')}`;
  inpState.prevMonth = pm;
  const el = document.getElementById('prev_month_label');
  if (el) el.textContent = pm;
}

// ── 전월 데이터 불러오기 → STEP2 이동
function loadPrevAndGo() {
  if (inpState.campuses.length === 0) {
    alert('관코드를 하나 이상 선택해주세요.'); return;
  }
  // 전월 heatmap에서 해당 캠퍼스 관련 셀만 추출
  const b = BUILDINGS[inpState.building];
  inpState.cells = {};
  inpState.loadedFromPrev = true;

  // 임차A 기준 우선: 7일 모두 동일 관이면 A형, 요일별 다르면 B형, 같은 요일 내 시간분할이면 MIX
  Object.entries(b.heatmap).forEach(([room, pat]) => {
    const vals = DAYS.map(d => pat[d] || '');
    const nonEmpty = vals.filter(v => v && v !== '-');
    if (nonEmpty.length === 0) return;

    // A형 판단: 7일 모두 동일 단독 관
    const allSame = nonEmpty.every(v => v === nonEmpty[0] && !v.includes('/') && v !== 'MIX');
    const isMyA = allSame && inpState.campuses.includes(nonEmpty[0]);

    DAYS.forEach(day => {
      const val = pat[day] || '';
      if (!val || val === '-') return;
      const key = room + '__' + day;
      const isMix = val.includes('/') || val === 'MIX';

      if (isMyA) {
        // A형: 전용 호실 → 단독 표시
        inpState.cells[key] = { campus: nonEmpty[0], isMix: false, times: [], fromPrev: true, typeA: true };
      } else if (isMix) {
        // MIX: 시간 정보는 비워두고 팝업으로 입력하도록 안내
        const calcRows = b.calcRows.filter(r => String(r.room) === String(room));
        const times = calcRows
          .filter(r => inpState.campuses.includes(r.campus) || true)
          .map(r => ({ campus: r.campus, start: '09:00', end: '14:00', mins: 300 }));
        inpState.cells[key] = { campus:'MIX', isMix:true, times, fromPrev:true, needsTimeEdit:true };
      } else if (inpState.campuses.some(c => val === c)) {
        // B형 단독: 이 관이 쓰는 요일
        inpState.cells[key] = { campus: val, isMix: false, times: [], fromPrev: true };
      } else {
        // 다른 관 셀도 수정 가능하게 표시
        inpState.cells[key] = { campus: val, isMix: false, times: [], fromPrev: true };
      }
    });
  });

  goStep(2);
  buildInputTimetable();

  // 안내 토스트
  const cnt = Object.values(inpState.cells).length;
  showToast(`전월(${inpState.prevMonth}) 데이터 불러옴 · ${cnt}개 셀 반영됨. 변경 셀만 수정하세요.`);
}

// ── 토스트 알림
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e3a8a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3500);
}

// ── 캠퍼스 목록 (건물별)
const INP_CAMPUSES = {
  b7: ['테디','영재','중사'],
};
const INP_COLORS = {
  '테디':'c-tedi', '영재':'c-youngjae', '중사':'c-jungsa',
};
const INP_BG = {
  '테디':'rgba(217,72,15,.13)', '영재':'rgba(47,158,68,.13)', '중사':'rgba(24,100,171,.13)',
  'MIX':'rgba(112,72,232,.13)',
};
const INP_FC = {
  '테디':'#7c2900', '영재':'#1a5c2a', '중사':'#0f3d6b', 'MIX':'#3d1f9e',
};

let _mixTarget = null; // { room, day }

function buildInputTimetable() {
  const b = BUILDINGS[inpState.building];
  const rooms = [...new Set(b.calcRows.map(r => String(r.room)))];
  const campuses = INP_CAMPUSES[inpState.building] || [];

  const modeBadge = document.getElementById('inp_mode_badge');
  if (modeBadge) modeBadge.textContent = inpState.loadedFromPrev ? '전월 불러옴 · 수정 모드' : '신규 입력';
  const bldgBadge = document.getElementById('inp_bldg_badge');
  if (bldgBadge) bldgBadge.textContent = b.name;
  const monthBadge = document.getElementById('inp_month_badge');
  if (monthBadge) monthBadge.textContent = inpState.month;

  const legend = document.getElementById('inp_legend');
  if (legend) {
    legend.innerHTML = campuses.map(c =>
      `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:${INP_BG[c]};color:${INP_FC[c]};font-size:11px;font-weight:700">${c}</span>`
    ).join('') +
    `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:${INP_BG['MIX']};color:${INP_FC['MIX']};font-size:11px;font-weight:700">MIX</span>` +
    (inpState.loadedFromPrev
      ? `<span style="padding:3px 10px;border-radius:20px;background:#fff3cd;border:1px solid #ffc107;font-size:11px;font-weight:700;color:#7c5800">🖊 수정됨</span><span style="font-size:11px;color:var(--text-sub)">· 좌클릭 변경 | 우클릭 전월값 복원</span>`
      : `<span style="font-size:11px;color:var(--text-sub)">· 좌클릭 관코드 순환 | 우클릭 초기화</span>`);
  }

  let html = `<table class="tt-inp"><thead><tr>
    <th style="min-width:90px">호실</th>
    ${DAYS.map(d=>`<th style="min-width:100px">${DAY_KR[d]}</th>`).join('')}
  </tr></thead><tbody>`;

  rooms.forEach(room => {
    html += `<tr><td class="room-label">${room}</td>`;
    DAYS.forEach(day => {
      const key = room + '__' + day;
      const saved = inpState.cells[key];
      const isModified = saved && saved.modified;
      let bg = 'var(--surface2)', fc = 'var(--text-sub)', label = '+', extraStyle = '';

      if (saved) {
        if (saved.isMix) {
          bg = INP_BG['MIX']; fc = INP_FC['MIX'];
          if (saved.needsTimeEdit) {
            label = `<div style="font-size:10px;font-weight:700;color:#7c5800">⚠ 시간 입력 필요</div>`;
            extraStyle = 'outline:2px solid #ffc107;outline-offset:-2px;';
          } else {
            label = saved.times.map(t => `<div style="font-size:10px;font-weight:700">${t.campus}</div><div style="font-size:9px">${t.start}~${t.end}</div>`).join('');
          }
        } else {
          bg = INP_BG[saved.campus] || 'var(--surface2)';
          fc = INP_FC[saved.campus] || 'var(--text-sub)';
          label = saved.campus;
        }
        if (isModified) extraStyle = 'outline:2px solid #ffc107;outline-offset:-2px;';
      }

      const ctxHandler = inpState.loadedFromPrev
        ? `restorePrevCell('${room}','${day}',this)`
        : `clearCell('${room}','${day}',this)`;
      const tipTxt = inpState.loadedFromPrev
        ? '좌클릭: 수정 | 우클릭: 전월값 복원'
        : '좌클릭: 관코드 선택 | 우클릭: 초기화';

      html += `<td class="tt-cell" id="tc_${key}"
        style="background:${bg};color:${fc};font-size:11px;font-weight:700;cursor:pointer;
               vertical-align:middle;text-align:center;padding:4px;
               border:1px solid var(--border);height:44px;${extraStyle}"
        onclick="handleCellClick('${room}','${day}',this)"
        oncontextmenu="${ctxHandler};return false;"
        title="${tipTxt}"
      >${label}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;

  const area = document.getElementById('tt_inp_area');
  if (area) area.innerHTML = html;
  updateCellCount();
}

// 우클릭: 전월값으로 복원
function restorePrevCell(room, day, el) {
  const key = room + '__' + day;
  const b = BUILDINGS[inpState.building];
  const origVal = b.heatmap[room] ? (b.heatmap[room][day] || '') : '';
  if (!origVal || origVal === '-') {
    clearCell(room, day, el); return;
  }
  const isMix = origVal.includes('/') || origVal === 'MIX';
  inpState.cells[key] = { campus: isMix ? 'MIX' : origVal, isMix, times: [], fromPrev: true, modified: false };
  // 시각 복원
  const bg = isMix ? INP_BG['MIX'] : (INP_BG[origVal]||'var(--surface2)');
  const fc = isMix ? INP_FC['MIX'] : (INP_FC[origVal]||'var(--text-sub)');
  el.style.background = bg; el.style.color = fc;
  el.style.outline = ''; el.innerHTML = isMix ? 'MIX' : origVal;
  updateCellCount();
  showToast('전월값으로 복원되었습니다.');
}

// 셀 클릭 → 인라인 선택 패널 표시
function handleCellClick(room, day, el) {
  // 이미 열린 패널 닫기
  const existing = document.getElementById('_cell_picker');
  if (existing) existing.remove();
  if (existing && existing.dataset.key === room + '__' + day) return;

  const campuses = INP_CAMPUSES[inpState.building] || [];
  const key = room + '__' + day;
  const cur = inpState.cells[key];

  // 인라인 선택 패널 생성
  const picker = document.createElement('div');
  picker.id = '_cell_picker';
  picker.dataset.key = key;
  picker.style.cssText = `
    position:fixed; z-index:3000;
    background:#fff; border:1.5px solid var(--accent); border-radius:10px;
    box-shadow:0 4px 20px rgba(0,0,0,.15);
    padding:10px; display:flex; flex-direction:column; gap:6px; min-width:160px;
  `;

  // 위치: 셀 아래
  const rect = el.getBoundingClientRect();
  picker.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  picker.style.left = Math.min(rect.left + window.scrollX, window.innerWidth - 180) + 'px';

  // 헤더
  const hdr = document.createElement('div');
  hdr.style.cssText = 'font-size:11px;font-weight:800;color:var(--text-sub);padding-bottom:4px;border-bottom:1px solid var(--border)';
  hdr.textContent = `${room} · ${DAY_KR[day]} 사용 관코드`;
  picker.appendChild(hdr);

  // 관코드 버튼들
  campuses.forEach(c => {
    const btn = document.createElement('button');
    const isCur = cur && !cur.isMix && cur.campus === c;
    btn.style.cssText = `
      padding:7px 12px; border-radius:7px; border:1.5px solid ${isCur ? INP_FC[c] : 'var(--border)'};
      background:${isCur ? INP_BG[c] : 'var(--surface2)'}; color:${INP_FC[c]};
      font-size:12px; font-weight:700; cursor:pointer; text-align:left;
      font-family:'Nanum Gothic',sans-serif; transition:all .1s;
    `;
    btn.textContent = (isCur ? '✓ ' : '') + c;
    btn.onclick = (e) => {
      e.stopPropagation();
      const wasFromPrev = inpState.cells[key] && inpState.cells[key].fromPrev;
      inpState.cells[key] = { campus: c, isMix: false, times: [],
        modified: inpState.loadedFromPrev, fromPrev: wasFromPrev };
      el.style.background = INP_BG[c];
      el.style.color = INP_FC[c];
      el.style.outline = inpState.loadedFromPrev ? '2px solid #ffc107' : '';
      el.style.outlineOffset = '-2px';
      el.innerHTML = c;
      picker.remove();
      updateCellCount();
    };
    picker.appendChild(btn);
  });

  // MIX 버튼 (같은 요일, 시간 분할)
  const mixBtn = document.createElement('button');
  const isMixCur = cur && cur.isMix;
  mixBtn.style.cssText = `
    padding:7px 12px; border-radius:7px;
    border:1.5px solid ${isMixCur ? INP_FC['MIX'] : '#c4b5fd'};
    background:${isMixCur ? INP_BG['MIX'] : '#f5f3ff'};
    color:${INP_FC['MIX']};
    font-size:12px; font-weight:700; cursor:pointer; text-align:left;
    font-family:'Nanum Gothic',sans-serif;
  `;
  mixBtn.innerHTML = '⏱ MIX <small style="font-weight:400;font-size:10px">시간대 분할 입력</small>';
  mixBtn.onclick = (e) => {
    e.stopPropagation();
    picker.remove();
    _mixTarget = { room, day, el, key };
    openMixModal(room, day, campuses);
  };
  picker.appendChild(mixBtn);

  // 초기화 버튼
  if (cur) {
    const clearBtn = document.createElement('button');
    clearBtn.style.cssText = `
      padding:5px 12px; border-radius:7px; border:1px solid var(--border);
      background:none; color:var(--text-sub); font-size:11px; cursor:pointer;
      font-family:'Nanum Gothic',sans-serif;
    `;
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = (e) => {
      e.stopPropagation();
      clearCell(room, day, el);
      picker.remove();
    };
    picker.appendChild(clearBtn);
  }

  document.body.appendChild(picker);

  // 외부 클릭 시 닫기
  setTimeout(() => {
    document.addEventListener('click', function closePicker() {
      picker.remove();
      document.removeEventListener('click', closePicker);
    }, { once: true });
  }, 0);
}

function clearCell(room, day, el) {
  const key = room + '__' + day;
  delete inpState.cells[key];
  el.style.background = 'var(--surface2)';
  el.style.color = 'var(--text-sub)';
  el.innerHTML = '+';
  updateCellCount();
}

// MIX 팝업
function openMixModal(room, day, campuses) {
  document.getElementById('mix_room_label').textContent = `${room} · ${DAY_KR[day]}`;
  const rows = document.getElementById('mix_time_rows');
  rows.innerHTML = '';
  // 기존 저장값 있으면 복원
  const key = room + '__' + day;
  const saved = inpState.cells[key];
  const initRows = saved && saved.isMix ? saved.times : [
    { campus: campuses[0], start:'09:00', end:'14:00' },
    { campus: campuses[1]||campuses[0], start:'14:00', end:'22:00' },
  ];
  initRows.forEach(t => appendMixRow(t, campuses));
  document.getElementById('mixModal').classList.add('open');
}

function appendMixRow(val, campuses) {
  const allCampuses = INP_CAMPUSES[inpState.building] || [];
  const rows = document.getElementById('mix_time_rows');
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
  div.innerHTML = `
    <select style="flex:1;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;font-family:\'Nanum Gothic\',sans-serif">
      ${allCampuses.map(c=>`<option ${c===(val&&val.campus)?'selected':''}>${c}</option>`).join('')}
    </select>
    <input type="time" value="${val&&val.start||''}"
      placeholder="시작"
      style="padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;width:88px">
    <span style="color:var(--text-sub);font-size:12px">~</span>
    <input type="time" value="${val&&val.end||''}"
      placeholder="종료"
      style="padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;width:88px">
    <button onclick="this.parentNode.remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;padding:0 4px">×</button>
  `;
  rows.appendChild(div);
}

function addMixRow() {
  const campuses = INP_CAMPUSES[inpState.building] || [];
  appendMixRow(null, campuses);
}

function saveMixTime() {
  if (!_mixTarget) return;
  const rows = document.getElementById('mix_time_rows').children;
  const times = [];
  for (const row of rows) {
    const sel = row.querySelector('select');
    const inputs = row.querySelectorAll('input[type=time]');
    if (!sel || inputs.length < 2) continue;
    const start = inputs[0].value, end = inputs[1].value;
    if (!start || !end) continue;
    const [sh,sm] = start.split(':').map(Number);
    const [eh,em] = end.split(':').map(Number);
    const mins = (eh*60+em) - (sh*60+sm);
    if (mins <= 0) { alert(`${sel.value}: 종료 시간이 시작 시간보다 늦어야 합니다.`); return; }
    times.push({ campus: sel.value, start, end, mins });
  }
  if (times.length === 0) { alert('최소 1개 이상 입력하세요.'); return; }

  // 비중 계산
  const total = times.reduce((s, t) => s + t.mins, 0);
  times.forEach(t => { t.ratio = (t.mins / total * 100).toFixed(1); });

  inpState.cells[_mixTarget.key] = { campus: 'MIX', isMix: true, times, needsTimeEdit: false,
    modified: inpState.loadedFromPrev };

  // 셀 업데이트
  const el = _mixTarget.el;
  el.style.background = INP_BG['MIX'];
  el.style.color = INP_FC['MIX'];
  el.innerHTML = times.map(t =>
    `<div style="font-size:10px;font-weight:700">${t.campus} ${t.ratio}%</div>`
  ).join('');

  closeMixModal();
  updateCellCount();
}

function closeMixModal() {
  document.getElementById('mixModal').classList.remove('open');
  _mixTarget = null;
}

function updateCellCount() {
  const cnt = Object.keys(inpState.cells).length;
  const el = document.getElementById('inp_cell_count');
  if (el) el.textContent = cnt > 0 ? `${cnt}개 셀 입력됨` : '';
}

// ── A/B 자동 판단 핵심 로직
function classifyRooms() {
  const b = BUILDINGS[inpState.building];
  const rooms = [...new Set(b.calcRows.map(r => String(r.room)))];
  const result = {}; // { room: { campus: { type, days, mixDays } } }

  rooms.forEach(room => {
    // 이 호실의 요일별 입력값 수집
    const dayMap = {};
    DAYS.forEach(day => {
      const key = room + '__' + day;
      const cell = inpState.cells[key];
      if (!cell) return;
      dayMap[day] = cell;
    });
    if (Object.keys(dayMap).length === 0) return;

    // 캠퍼스별 집계
    const campusData = {};
    Object.entries(dayMap).forEach(([day, cell]) => {
      if (cell.isMix) {
        // MIX: 각 관별로 mixDays에 기록
        cell.times.forEach(t => {
          campusData[t.campus] = campusData[t.campus] || { days:[], mixDays:[], mixTimes:{} };
          campusData[t.campus].mixDays.push(day);
          campusData[t.campus].mixTimes[day] = campusData[t.campus].mixTimes[day] || [];
          campusData[t.campus].mixTimes[day].push(t);
        });
      } else {
        campusData[cell.campus] = campusData[cell.campus] || { days:[], mixDays:[], mixTimes:{} };
        campusData[cell.campus].days.push(day);
      }
    });

    // 임차A/B 판단
    Object.entries(campusData).forEach(([campus, data]) => {
      const totalDays = data.days.length;
      const mixDays = data.mixDays.length;
      let type;
      if (mixDays > 0 && totalDays === 0) {
        type = 'B-MIX'; // 순수 시간분할
      } else if (mixDays > 0) {
        type = 'B-MIX'; // 일부 요일 MIX
      } else if (totalDays === 7) {
        type = 'A';     // 7일 전용
      } else {
        type = 'B';     // 일부 요일 단독
      }
      if (!result[room]) result[room] = {};
      result[room][campus] = { type, days: data.days, mixDays: data.mixDays, mixTimes: data.mixTimes };
    });
  });
  return result;
}

function submitInpData() {
  const cnt = Object.values(inpState.cells).length;
  if (cnt === 0) { alert('입력된 데이터가 없습니다.'); return; }

  // MIX 시간 미입력 체크
  const needsEdit = Object.entries(inpState.cells).filter(([k,v]) => v.needsTimeEdit);
  if (needsEdit.length > 0) {
    const rooms = needsEdit.map(([k]) => k.split('__')[0]).join(', ');
    alert(`⚠ 시간 미입력 MIX 셀이 있습니다: ${rooms}\n해당 셀을 클릭해서 시간을 입력해주세요.`);
    return;
  }

  // A/B 자동 분류
  const classified = classifyRooms();
  const b = BUILDINGS[inpState.building];

  // 검토 모달 표시
  showReviewModal(classified, b);
}

            <td class="num" style="font-weight:800;color:#1a5c2a">${v.A || '-'}</td>
            <td class="num" style="font-weight:800;color:#0f3d6b">${v.B || '-'}</td>
            <td class="num" style="font-weight:800;color:#3d1f9e">${v.BMIX || '-'}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  goStep(3);
}

function goStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('spanel'+i).classList.remove('active');
    const s = document.getElementById('istep'+i);
    s.classList.remove('active','done');
  });
  for (let i = 1; i < n; i++) document.getElementById('istep'+i).classList.add('done');
  document.getElementById('istep'+n).classList.add('active');
  document.getElementById('spanel'+n).classList.add('active');
}

// 구조: { id, region, dept, campus, building, floor, spaceType, room, area, maxCapacity, curStudents, className, stdFee }
// EFF_DATA: { bldgKey: BUILDINGS 키값 } → 지역/건물/층수 자동 연동
// bldgKey 기준으로 BUILDINGS에서 region/name/floor 자동 로드
function getEffBldgInfo(bldgKey) {
  const b = BUILDINGS[bldgKey];
  if (!b) return { region:'', building:'', floor:'' };
  const m = (b.name||'').match(/(\d+층)/);
  return {
    region:   b.region || '',
    building: (b.name||'').replace(/\s*\d+층\s*/, '').trim(),
    floor:    m ? m[1] : '',
  };
}

// EFF_DATA 행에 BUILDINGS 동적 값을 합쳐서 반환 (region은 항상 최신 BUILDINGS 기준)
function effRow(r) {
  const info = getEffBldgInfo(r.bldgKey || '');
  return { ...r, region: info.region, building: r.building || info.building, floor: r.floor || info.floor };
}

function buildEffModalFields() {
  const autoFields = ['region','building','floor','campus','room','area'];
  const fields = [
    ['region','지역','text','자동 세팅'],
    ['building','건물명','text','자동 세팅'],
    ['floor','층수','text','자동 세팅'],
    ['campus','관코드','text','자동 세팅'],
    ['room','호실','text','자동 세팅'],
    ['area','평수','number','자동 세팅'],
    ['dept','사업부','text','예: 중등사업부'],
    ['spaceType','공간타입','select','A|B|C|D|E'],
    ['maxCapacity','최대수용인원','number','명'],
    ['curStudents','현재수업인원','number','명'],
    ['className','수업명/반명','text','예: 중등수학심화A'],
    ['stdFee','표준수강료','number','원'],
  ];
  return fields.map(([k,label,type,ph]) => {
    const isAuto = autoFields.includes(k);
    const inputStyle = isAuto
      ? 'width:100%;padding:7px 10px;background:#f0f5ff;border:1px solid #c5d5ff;border-radius:6px;color:#4263eb;font-size:12px;outline:none;font-weight:700;font-family:Nanum Gothic,sans-serif'
      : 'width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;font-family:Nanum Gothic,sans-serif';
    const labelColor = isAuto ? 'var(--accent)' : 'var(--text-sub)';
    let input;
    if (type === 'select') {
      input = '<select id="eff_in_' + k + '" style="' + inputStyle + '">' +
        ph.split('|').map(o => '<option>' + o + '</option>').join('') +
        '</select>';
    } else {
      input = '<input type="' + type + '" id="eff_in_' + k + '" placeholder="' + ph + '" ' +
        (isAuto ? 'readonly ' : '') +
        'style="' + inputStyle + '">';
    }
    return '<div>' +
      '<div style="font-size:11px;color:' + labelColor + ';margin-bottom:3px;font-weight:700">' +
        (isAuto ? '🔗 ' : '') + label +
      '</div>' + input + '</div>';
  }).join('');
}

function initEffAnalysis() {
  initEffFilters();

  renderEffKPI();
  renderEffTable();
}

// ── classKey DISTINCT 집계 헬퍼 (요일 중복 완전 제거)
function getClassMapByDept(rows) {
  const classMap = new Map();
  rows.forEach(r => {
    const ck = r.classKey || `${r.bldgKey||''}_${r.room}_${r.campus}_${r.className}`;
    if (!classMap.has(ck)) classMap.set(ck, { ...r, _ck: ck });
    // 요일만 추가 (다른 필드는 첫 행 기준)
  });
  return [...classMap.values()];
}

function calcDeptStats(rows) {
  const uniqueRooms   = new Set(rows.map(r => (r.bldgKey||'')+'::'+(r.room||'')));
  const deduped       = getClassMapByDept(rows); // classKey 기준 1개씩
  let totalStudents=0, totalMaxSales=0, totalCurSales=0, totalMaxCap=0;
  deduped.forEach(r => {
    const st = calcEffStats(r);
    totalStudents += st.totalStudents;
    totalMaxSales += st.totalMaxSales;
    totalCurSales += st.totalCurSales;
    totalMaxCap   += (r.maxCapacity||0);
  });
  return {
    roomCount:     uniqueRooms.size,
    classCount:    deduped.length,
    totalStudents,
    totalMaxCap,
    totalMaxSales,
    totalCurSales,
    capRate:   totalMaxCap   ? (totalStudents/totalMaxCap*100).toFixed(1)   : 0,
    salesRate: totalMaxSales ? (totalCurSales/totalMaxSales*100).toFixed(1) : 0,
  };
}

// ── 사업부별 KPI 카드
function renderDeptKPI() {
  const el = document.getElementById('eff_dept_kpi_row');
  if (!el) return;

  const data = getFilteredEff();
  const byDept = {};
  data.forEach(r => {
    const dept = r.dept || '미분류';
    if (!byDept[dept]) byDept[dept] = [];
    byDept[dept].push(r);
  });

  const deptColors = {
    '중등사업부':'#4263eb','초등사업부':'#2d6a4f',
    '고등사업부':'#c05621','테디사업부':'#7048e8','미분류':'#888'
  };

  const DEPT_ORDER = ['초등사업부','중등사업부','고등사업부','테디사업부'];
  const sortedDepts = Object.entries(byDept).sort((a,b)=>{
    const ai=DEPT_ORDER.indexOf(a[0]), bi=DEPT_ORDER.indexOf(b[0]);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
  el.innerHTML = sortedDepts.map(([dept, rows]) => {
    const s = calcDeptStats(rows);
    const grade = s.capRate>=80?'#2f9e44':s.capRate>=60?'#e67700':'#e03131';
    const color = deptColors[dept] || '#888';

    return `
    <div class="kpi-card" style="border-top:4px solid ${color}">
      <div style="font-size:13px;font-weight:800;color:${color};margin-bottom:8px">${dept}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div>
          <div style="font-size:10px;color:var(--text-sub)">수용효율</div>
          <div style="font-size:20px;font-weight:800;color:${grade};font-family:'JetBrains Mono',monospace">${s.capRate}%</div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--text-sub)">매출효율</div>
          <div style="font-size:20px;font-weight:800;color:${grade};font-family:'JetBrains Mono',monospace">${s.salesRate}%</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text-sub);border-top:1px solid var(--border);padding-top:8px">
        호실 <strong>${s.roomCount}개</strong> · 수업 <strong>${s.classCount}개</strong><br>
        현재 <strong>${s.totalStudents}명</strong> / 최대 <strong>${s.totalMaxCap}명</strong><br>
        표준매출 ${Math.round(s.totalMaxSales/10000)}만원<br>
        발생매출(추정) <strong style="color:#4263eb">${Math.round(s.totalCurSales/10000)}만원</strong>
      </div>
    </div>`;
  }).join('') || '<div style="color:var(--text-sub);padding:20px">데이터 없음</div>';
}

// ── 가동률 분석 초기화
function initOccupancy() {
  // 필터 옵션 세팅
  const data = EFF_DATA;
  const setOpts = (id, vals) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '<option value="">전체</option>' +
      [...new Set(vals)].filter(Boolean).sort().map(v => `<option value="${v}">${v}</option>`).join('');
  };

  setOpts('occ_f_campus', data.map(r => r.campus));

function resetOccFilter() {
  ['occ_f_dept','occ_f_campus','occ_f_room'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  renderOccupancy();
}

function getOccData() {
  const dept   = document.getElementById('occ_f_dept')?.value   || '';
  const campus = document.getElementById('occ_f_campus')?.value || '';
  const room   = document.getElementById('occ_f_room')?.value   || '';
  return EFF_DATA.filter(r =>
    (!dept   || r.dept   === dept) &&
    (!campus || r.campus === campus) &&
    (!room   || r.room   === room)
  );
}

function renderOccupancy() {
  const data = getOccData();
  if (!data.length) {
    ['occ_kpi','occ_day_chart','occ_time_chart','occ_dept_chart','occ_heatmap'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = '<div style="padding:20px;color:var(--text-sub);text-align:center">데이터 없음</div>';
    });
    return;
  }

  // 운영시간 기준
  const OPS = { weekday: { start:14, end:22 }, weekend: { start:9, end:22 } };
  const DAYS_KR = ['월','화','수','목','금','토','일'];
  const DAYS_EN = ['월','화','수','목','금','토','일'];
  const isWeekend = d => d === '토' || d === '일';

  // 고유 호실 수
  const uniqueRooms = [...new Set(data.map(r => (r.bldgKey||'')+'::'+(r.room||'')))];
  const totalRooms  = uniqueRooms.length;

  // ── 공통 toMin 헬퍼
  const toMin = t => {
    const s = String(t||'').replace(/[시:]/g,':').replace(/오전|오후|분/g,'').trim();
    const p = s.split(':'); return (+p[0]||0)*60+(+p[1]||0);
  };

  // ── classType 분리: 초등/중등(교시있음) vs 고등(빈칸→시간기준)
  const withType    = data.filter(r => r.classType && String(r.classType).trim());
  const withoutType = data.filter(r => !r.classType || !String(r.classType).trim());

  // ── 교시별 집계 (초등/중등)
  const typeStats = {};
  withType.forEach(r => {
    const t = String(r.classType).trim();
    if (!typeStats[t]) typeStats[t] = { rooms: new Set(), count:0 };
    typeStats[t].rooms.add((r.bldgKey||'')+'::'+(r.room||''));
    typeStats[t].count++;
  });

  // ── 요일별 가동률 (전체)
  const dayStats = {};
  DAYS_KR.forEach(d => {
    const rows = data.filter(r => r.day === d);
    const oRooms = [...new Set(rows.map(r=>(r.bldgKey||'')+'::'+(r.room||'')))];
    dayStats[d] = { rate: totalRooms?(oRooms.length/totalRooms*100).toFixed(1):0, count:rows.length, rooms:oRooms.length };
  });

  // ── 시간대별 집계 (고등: classType 없는 것)
  const timeSlots = {};
  for (let h=9;h<22;h++) timeSlots[`${String(h).padStart(2,'0')}:00`] = { count:0 };
  withoutType.forEach(r => {
    const st=toMin(r.timeStart), en=toMin(r.timeEnd);
    if (!st||!en||en<=st) return;
    Object.keys(timeSlots).forEach(slot => {
      const sh=parseInt(slot)*60;
      if (sh>=st && sh<en) timeSlots[slot].count++;
    });
  });
  const maxTimeCount = Math.max(...Object.values(timeSlots).map(v=>v.count),1);

  // ── 사업부별 가동률
  const deptStats = {};
  data.forEach(r => {
    const dept = r.dept||'미분류';
    if (!deptStats[dept]) deptStats[dept] = { rooms:new Set(), classKeys:new Set(), days:new Set() };
    deptStats[dept].rooms.add((r.bldgKey||'')+'::'+(r.room||''));
    deptStats[dept].classKeys.add(r.classKey||`${r.room}_${r.className}`);
    if (r.day) deptStats[dept].days.add(r.room+'_'+r.day);
  });

  // ── KPI
  const avgDayRate = (Object.values(dayStats).reduce((s,d)=>s+parseFloat(d.rate),0)/7).toFixed(1);
  const peakDay  = Object.entries(dayStats).sort((a,b)=>parseFloat(b[1].rate)-parseFloat(a[1].rate))[0];
  const peakType = Object.entries(typeStats).sort((a,b)=>b[1].count-a[1].count)[0];
  const peakTime = Object.entries(timeSlots).filter(([,v])=>v.count>0).sort((a,b)=>b[1].count-a[1].count)[0];

  const kpiEl = document.getElementById('occ_kpi');
  if (kpiEl) kpiEl.innerHTML = [
    ['평균 주간 가동률', avgDayRate+'%', '전 요일 평균'],
    ['분석 호실', totalRooms+'개', '고유 강의실'],
    ['최고 가동 요일', peakDay?peakDay[0]+'요일 '+peakDay[1].rate+'%':'-', ''],
    ['피크', peakType?peakType[0]: (peakTime?peakTime[0]:'-'), peakType?'교시':'시간대'],
  ].map(([label,val,sub]) => `
    <div class="kpi-card c-total">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value" style="font-size:20px">${val}</div>
      <div class="kpi-sub">${sub}</div>
    </div>`).join('');

  const barRow = (label, pct, sub, color) => {
    const p = Math.min(100, parseFloat(pct)||0);
    const cl = color||(p>=80?'#2f9e44':p>=60?'#4263eb':p>=30?'#e67700':'#d0d0d0');
    return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
      <div style="width:76px;font-size:12px;font-weight:700;text-align:right;flex-shrink:0">${label}</div>
      <div style="flex:1;height:22px;background:#f0f0f0;border-radius:4px;overflow:hidden">
        <div style="width:${p}%;height:100%;background:${cl};border-radius:4px;
          display:flex;align-items:center;padding-left:8px;transition:width .5s">
          ${p>15?`<span style="font-size:11px;font-weight:800;color:#fff">${p.toFixed(1)}%</span>`:''}
        </div>
      </div>
      ${p<=15?`<span style="font-size:11px;font-weight:700;color:${cl};width:36px">${p.toFixed(1)}%</span>`:''}
      <span style="font-size:10px;color:var(--text-sub);width:52px;text-align:right;flex-shrink:0">${sub||''}</span>
    </div>`;
  };

  // ── 요일별 차트 사업부 탭 생성
  let _occDayDept = '전체';
  const DEPT_ORDER3 = ['초등사업부','중등사업부','고등사업부','테디사업부'];
  const depts = ['전체', ...new Set(data.map(r=>r.dept).filter(Boolean))].sort((a,b)=>{
    if(a==='전체') return -1; if(b==='전체') return 1;
    return (DEPT_ORDER3.indexOf(a)<0?99:DEPT_ORDER3.indexOf(a))-(DEPT_ORDER3.indexOf(b)<0?99:DEPT_ORDER3.indexOf(b));
  });
  const tabsEl = document.getElementById('occ_day_dept_tabs');
  if (tabsEl) {
    tabsEl.innerHTML = depts.map(d => `
      <button id="occ_day_tab_${d}" onclick="selectOccDayDept('${d}')"
        style="padding:3px 10px;border-radius:12px;border:1px solid ${d==='전체'?'#4263eb':'var(--border)'};
               background:${d==='전체'?'#4263eb':'transparent'};
               color:${d==='전체'?'#fff':'var(--text-sub)'};
               font-size:11px;font-weight:700;cursor:pointer;
               font-family:'Nanum Gothic',sans-serif;transition:all .15s">
        ${d}
      </button>`).join('');
  }

  // 요일별 차트 렌더 함수 (사업부 필터 적용)
  window._occAllData = data;
  window.renderOccDayChart = function(dept) {
    const filtered = dept === '전체' ? data : data.filter(r => r.dept === dept);
    const rooms = [...new Set(filtered.map(r=>(r.bldgKey||'')+'::'+(r.room||'')))];
    const total = rooms.length || 1;
    const dayEl = document.getElementById('occ_day_chart');
    if (!dayEl) return;
    dayEl.innerHTML = DAYS_KR.map(d => {
      const rows = filtered.filter(r => r.day === d);
      const oRooms = [...new Set(rows.map(r=>(r.bldgKey||'')+'::'+(r.room||'')))];
      const rate = (oRooms.length/total*100).toFixed(1);
      return barRow(d+'요일', rate, oRooms.length+'호실/'+rows.length+'건');
    }).join('');
  };
  window.selectOccDayDept = function(dept) {
    _occDayDept = dept;
    depts.forEach(d => {
      const btn = document.getElementById('occ_day_tab_'+d);
      if (!btn) return;
      const sel = d === dept;
      btn.style.background  = sel ? '#4263eb' : 'transparent';
      btn.style.color       = sel ? '#fff' : 'var(--text-sub)';
      btn.style.borderColor = sel ? '#4263eb' : 'var(--border)';
    });
    window.renderOccDayChart(dept);
  };

  // 요일별 차트 (기본: 전체)
  window.renderOccDayChart('전체');

  // 교시별(초등/중등) + 시간대별(고등) 차트 + 사업부 탭
  const timeEl = document.getElementById('occ_time_chart');
  if (timeEl) {
    // 사업부 탭 생성
    const DEPT_ORDER2 = ['초등사업부','중등사업부','고등사업부','테디사업부'];
  const timeDepts = ['전체', ...new Set(data.map(r=>r.dept).filter(Boolean))].sort((a,b)=>{
    if(a==='전체') return -1; if(b==='전체') return 1;
    return (DEPT_ORDER2.indexOf(a)<0?99:DEPT_ORDER2.indexOf(a))-(DEPT_ORDER2.indexOf(b)<0?99:DEPT_ORDER2.indexOf(b));
  });
    let _occTimeDept = '전체';

    const tabBar = `<div id="occ_time_dept_tabs" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">
      ${timeDepts.map(d=>`
        <button id="occ_time_tab_${d.replace(/\s/g,'_')}" onclick="selectOccTimeDept('${d}')"
          style="padding:3px 10px;border-radius:12px;border:1px solid ${d==='전체'?'#c05621':'var(--border)'};
                 background:${d==='전체'?'#c05621':'transparent'};
                 color:${d==='전체'?'#fff':'var(--text-sub)'};
                 font-size:11px;font-weight:700;cursor:pointer;
                 font-family:'Nanum Gothic',sans-serif;transition:all .15s">
          ${d}
        </button>`).join('')}
    </div>`;

    timeEl.innerHTML = tabBar + '<div id="occ_time_content"></div>';

    // 시간대별 차트 렌더 (사업부 필터)
    window.renderOccTimeChart = function(dept) {
      const filtered = dept==='전체' ? data : data.filter(r=>r.dept===dept);
      const fWithType    = filtered.filter(r => r.classType && String(r.classType).trim());
      const fWithoutType = filtered.filter(r => !r.classType || !String(r.classType).trim());

      // 교시별 집계
      const fTypeStats = {};
      fWithType.forEach(r => {
        const t = String(r.classType).trim();
        if (!fTypeStats[t]) fTypeStats[t] = { rooms:new Set(), count:0 };
        fTypeStats[t].rooms.add((r.bldgKey||'')+'::'+(r.room||''));
        fTypeStats[t].count++;
      });

      // 시간대별 집계 (toMin 개선: 다양한 형식 허용)
      const fTimeSlots = {};
      for (let h=9;h<22;h++) fTimeSlots[`${String(h).padStart(2,'0')}:00`] = { count:0 };
      const safeToMin = t => {
        if (!t && t !== 0) return 0;
        const raw = String(t).trim();
        // 엑셀 시간 소수점 형식 처리 (예: 0.770833 = 18:30)
        if (/^0\.\d+$/.test(raw)) {
          const mins = Math.round(parseFloat(raw)*24*60);
          return mins;
        }
        const s = raw.replace(/오전|오후|분/g,'').replace(/시(?=\d|:|$)/g,':').replace(/시$/g,':00').trim();
        const parts = s.replace(/[~\-]/g,':').split(':');
        const h = parseInt(parts[0])||0;
        const m = parseInt(parts[1])||0;
        return h*60+m;
      };
      fWithoutType.forEach(r => {
        const st = safeToMin(r.timeStart), en = safeToMin(r.timeEnd);
        if (!st && !en) return;
        if (en <= st) return;
        Object.keys(fTimeSlots).forEach(slot => {
          const sh = parseInt(slot)*60;
          if (sh>=st && sh<en) fTimeSlots[slot].count++;
        });
      });
      const fMaxTime = Math.max(...Object.values(fTimeSlots).map(v=>v.count),1);
      const fTotalRooms = [...new Set(filtered.map(r=>(r.bldgKey||'')+'::'+(r.room||'')))].length || 1;

      let html2 = '';
      if (Object.keys(fTypeStats).length > 0) {
        const ORDER = ['1교시','2교시','3교시','특목','성대경시'];
        const sorted = Object.entries(fTypeStats).sort((a,b)=>{
          const ai=ORDER.indexOf(a[0]),bi=ORDER.indexOf(b[0]);
          return (ai<0?99:ai)-(bi<0?99:bi);
        });
        html2 += '<div style="font-size:11px;font-weight:800;color:#2d6a4f;margin-bottom:8px">📚 교시별</div>';
        html2 += sorted.map(([type,v])=>{
          const pct = (v.rooms.size/fTotalRooms*100).toFixed(1);
          return barRow(type, pct, v.rooms.size+'호실/'+v.count+'건', '#7048e8');
        }).join('');
      }

      const hasTimeData = Object.values(fTimeSlots).some(v=>v.count>0);
      if (fWithoutType.length > 0) {
        html2 += `<div style="font-size:11px;font-weight:800;color:#c05621;margin:${Object.keys(fTypeStats).length>0?'14px':'0'}px 0 8px">🕐 시간대별</div>`;
        if (hasTimeData) {
          html2 += Object.entries(fTimeSlots)
            .filter(([,v])=>v.count>0)
            .map(([slot,v])=>barRow(slot, (v.count/fMaxTime*100).toFixed(1), v.count+'건', '#c05621'))
            .join('');
        } else {
          html2 += '<div style="font-size:11px;color:var(--text-sub);padding:8px">시작/종료 시간 데이터를 확인해주세요</div>';
        }
      }
      if (!html2) html2 = '<div style="color:var(--text-sub);padding:20px;text-align:center">데이터 없음</div>';

      const content = document.getElementById('occ_time_content');
      if (content) content.innerHTML = html2;
    };

    window.selectOccTimeDept = function(dept) {
      timeDepts.forEach(d => {
        const btn = document.getElementById('occ_time_tab_'+d.replace(/\s/g,'_'));
        if (!btn) return;
        const sel = d===dept;
        btn.style.background  = sel?'#c05621':'transparent';
        btn.style.color       = sel?'#fff':'var(--text-sub)';
        btn.style.borderColor = sel?'#c05621':'var(--border)';
      });
      window.renderOccTimeChart(dept);
    };

    window.renderOccTimeChart('전체');
  }

  // 사업부별 차트
  const deptEl = document.getElementById('occ_dept_chart');
  if (deptEl) {
    const deptItems = Object.entries(deptStats).map(([dept,v]) => {
      const rate = v.rooms.size ? (v.days.size/v.rooms.size/7*100).toFixed(1) : 0;
      return [dept, rate, v.rooms.size+'호실/'+v.classKeys.size+'수업'];
    }).sort((a,b)=>parseFloat(b[1])-parseFloat(a[1]));
    deptEl.innerHTML = deptItems.map(([label,rate,sub]) => barRow(label,rate,sub)).join('');
  }

  // 호실×요일 히트맵
  const hmEl = document.getElementById('occ_heatmap');

// 필터 임시값 (조회 버튼 누르기 전까지 적용 안됨)
let effFilterPending = { region:'', building:'', dept:'', campus:'', spaceType:'' };

function onEffFilterChange(k, val) {
  effFilterPending[k] = val;
  // 지역 바뀌면 건물/관코드 옵션 연동 갱신
  if (k === 'region') updateEffFilterCascade();
  if (k === 'building') updateEffCampusOptions();
}

function updateEffFilterCascade() {
  const region = effFilterPending.region;
  // 건물 옵션: 해당 지역 건물만
  const bldgSel = document.getElementById('eff_f_building');
  if (bldgSel) {
    const bldgs = Object.values(BUILDINGS)
      .filter(b => !region || b.region === region)
      .map(b => (b.name||'').replace(/\s*\d+층\s*/,'').trim())
      .filter(Boolean);
    const uniq = [...new Set(bldgs)].sort();
    bldgSel.innerHTML = '<option value="">전체</option>' + uniq.map(v=>'<option value="'+v+'">'+v+'</option>').join('');
    effFilterPending.building = '';
  }
  // 관코드 옵션: 해당 지역 건물의 관코드
  updateEffCampusOptions();
}

function updateEffCampusOptions() {
  const region   = effFilterPending.region;
  const building = effFilterPending.building;
  const campSel  = document.getElementById('eff_f_campus');
  if (!campSel) return;
  const camps = [];
  Object.values(BUILDINGS).forEach(b => {
    const bName = (b.name||'').replace(/\s*\d+층\s*/,'').trim();
    if (region   && b.region !== region)   return;
    if (building && bName    !== building) return;
    (b.campuses||[]).forEach(c => camps.push(String(c)));
  });
  const uniq = [...new Set(camps)].sort();
  campSel.innerHTML = '<option value="">전체</option>' + uniq.map(v=>'<option value="'+v+'">'+v+'</option>').join('');
  effFilterPending.campus = '';
}

function applyEffFilter() {
  effFilter = { ...effFilterPending };
  renderDeptKPI();
  renderEffKPI();
  renderEffTable();
  const kpi = document.getElementById('eff_kpi_row');
  if (kpi) kpi.scrollIntoView({ behavior:'smooth', block:'start' });
}

function initEffFilters() {
  effFilterPending = { region:'', building:'', dept:'', campus:'', spaceType:'' };
  const keys = ['region','building','dept','campus','spaceType'];
  keys.forEach(k => {
    const sel = document.getElementById('eff_f_' + k);
    if (!sel) return;
    let vals = [];
    if (k === 'region') {
      vals = [...new Set(Object.values(BUILDINGS).map(b => b.region).filter(Boolean))].sort();
    } else if (k === 'building') {
      vals = [...new Set(Object.values(BUILDINGS).map(b => (b.name||'').replace(/\s*\d+층\s*/,'').trim()).filter(Boolean))].sort();
    } else if (k === 'campus') {
      // 전체 BUILDINGS의 모든 관코드
      const all = [];
      Object.values(BUILDINGS).forEach(b => (b.campuses||[]).forEach(c => all.push(String(c))));
      vals = [...new Set(all)].sort();
    } else if (k === 'dept') {
      // EFF_DATA + 등록 가능 사업부 목록
      const depts = [...new Set(EFF_DATA.map(r => r.dept).filter(Boolean))];
      if (!depts.length) depts.push('중등사업부','초등사업부','고등사업부','테디사업부');
      vals = depts.sort();
    } else if (k === 'spaceType') {
      vals = ['A','B','C','D','E'];
    }
    sel.innerHTML = '<option value="">전체</option>' + vals.map(v=>'<option value="'+v+'">'+v+'</option>').join('');
    sel.value = effFilter[k] || '';
  });
}

function getFilteredEff() {
  return EFF_DATA.map(effRow).filter(r =>
    (!effFilter.region    || r.region    === effFilter.region) &&
    (!effFilter.building  || r.building  === effFilter.building) &&
    (!effFilter.dept      || r.dept      === effFilter.dept) &&
    (!effFilter.campus    || r.campus    === effFilter.campus) &&
    (!effFilter.spaceType || r.spaceType === effFilter.spaceType)
  );
}

function resetEffFilter() {
  effFilter = { region:'', building:'', dept:'', campus:'', spaceType:'' };
  effFilterPending = { region:'', building:'', dept:'', campus:'', spaceType:'' };
  initEffFilters();
  renderDeptKPI();
  renderEffKPI();
  renderEffTable();
}

let effAnalysisHistory = {};  // { campus: [{role,content}] }

function buildEffContext(camp) {
  const data = EFF_DATA.filter(r => r.campus === camp);
  if (!data.length) return '';

  const totalStudents = data.reduce((s,r) => s+r.curStudents, 0);
  const totalMax      = data.reduce((s,r) => s+r.maxCapacity, 0);
  const totalStdSales = data.reduce((s,r) => s+(r.maxCapacity*r.stdFee), 0);
  const totalCurSales = data.reduce((s,r) => s+(r.curStudents*r.stdFee), 0);
  const capRate  = totalMax ? (totalStudents/totalMax*100).toFixed(1) : 0;
  const salesRate= totalStdSales ? (totalCurSales/totalStdSales*100).toFixed(1) : 0;
  const vacantSlots = data.map(r => r.maxCapacity - r.curStudents).filter(v=>v>0);
  const totalVacant = vacantSlots.reduce((s,v)=>s+v,0);

  const roomDetails = data.map(r => {
    const eff = r.maxCapacity ? (r.curStudents/r.maxCapacity*100).toFixed(0) : 0;
    return `  - ${r.room}호 (${r.area||"-"}평, 최대${r.maxCapacity}명): ${r.className} / 현재 ${r.curStudents}명 / 효율 ${eff}% / 수강료 ${r.stdFee.toLocaleString()}원`;
  }).join('\n');

  return `당신은 교육 사업 공간 운영 전략 컨설턴트입니다.

[${camp} 캠퍼스 운영 현황]
- 총 호실: ${data.length}개 | 현재 수강인원: ${totalStudents}명 / 최대수용: ${totalMax}명
- 수용효율: ${capRate}% | 여유좌석: ${totalVacant}석 | 매출효율: ${salesRate}%
- 현재 월매출: ${Math.round(totalCurSales/10000)}만원 | 최대가능 매출: ${Math.round(totalStdSales/10000)}만원 | 갭: ${Math.round((totalStdSales-totalCurSales)/10000)}만원

[호실별 상세]
${roomDetails}

[효율 기준] 80%↑ 우수 / 60~80% 보통 / 60%↓ 주의

★ 응답 규칙 (반드시 준수):
- 반드시 JSON만 반환. 다른 텍스트 금지.
- 아래 형식 그대로 반환:

{
  "summary": "한 줄 핵심 요약 (30자 이내)",
  "diagnosis": [
    {"room": "호실명", "status": "우수|보통|주의", "issue": "문제점 한 줄", "action": "액션 한 줄"}
  ],
  "scenarios": [
    {
      "label": "시나리오명 (예: 현재, 단기개선, 적극개선)",
      "students": 숫자,
      "capRate": 숫자,
      "monthlySales": 숫자,
      "description": "방법 한 줄"
    }
  ],
  "insight": "전략적 인사이트 2~3문장"
}`.trim();
}
